name: Java Check

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clone repository
      uses: actions/checkout@v3

    - name: Install Java
      uses: actions/setup-java@v3

    - name: Compile all Java files
      run: find . -name "*.java" -exec javac {} + 